services:
  web:
    build: .
    container_name: smartbench-web
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/srv/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: smartbench-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartbench}
      POSTGRES_USER: ${POSTGRES_USER:-smartbench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartbench}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartbench} -d ${POSTGRES_DB:-smartbench}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: smartbench-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: smartbench-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@smartbench.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

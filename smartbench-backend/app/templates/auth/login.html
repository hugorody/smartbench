<!doctype html>
<html lang="en" class="h-full bg-slate-100">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | SmartBench</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center bg-gradient-to-br from-slate-100 to-cyan-100">
  <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8">
    <h1 class="text-2xl font-semibold">SmartBench Login</h1>
    <p class="text-slate-600 text-sm mt-2">Internal scientific platform access scaffold.</p>

    <form method="post" class="mt-6 space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input name="email" type="email" class="w-full rounded border border-slate-300 p-2" placeholder="you@lab.org" required />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Full Name</label>
        <input name="full_name" class="w-full rounded border border-slate-300 p-2" placeholder="Dr. Jane Doe" />
      </div>
      <button class="w-full bg-slate-900 text-white rounded p-2">Sign in</button>
    </form>
  </div>
</body>
</html>

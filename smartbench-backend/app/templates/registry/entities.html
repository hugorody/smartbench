{% extends "base.html" %}
{% block title %}Entities | SmartBench{% endblock %}
{% block content %}
<div class="space-y-6">
  <h2 class="text-2xl font-semibold">Entities</h2>

  <section class="bg-white rounded-xl shadow p-4">
    <h3 class="font-semibold mb-3">Create Entity</h3>
    <form id="entity-form" class="space-y-3">
      <input type="hidden" name="workspace_id" value="{{ workspace.id }}" />
      <div class="grid md:grid-cols-3 gap-3">
        <select name="entity_type_id" class="border rounded p-2" required>
          {% for et in entity_types %}
          <option value="{{ et.id }}">{{ et.name }}</option>
          {% endfor %}
        </select>
        <input name="external_id" placeholder="External ID" class="border rounded p-2" required />
        <input name="name" placeholder="Display Name" class="border rounded p-2" required />
      </div>
      <textarea name="data_json" class="w-full border rounded p-2 font-mono text-sm" rows="5" required>{"name":"example"}</textarea>
      <button class="bg-slate-900 text-white rounded px-4 py-2">Create</button>
      <p id="entity-form-message" class="text-sm"></p>
    </form>
  </section>

  <section class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50"><tr><th class="text-left p-3">External ID</th><th class="text-left p-3">Name</th><th class="text-left p-3">Status</th></tr></thead>
      <tbody>
        {% for e in entities %}
        <tr class="border-t"><td class="p-3">{{ e.external_id }}</td><td class="p-3">{{ e.name }}</td><td class="p-3">{{ e.status }}</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script>
window.SmartBenchForms.bindEntityForm();
</script>
{% endblock %}

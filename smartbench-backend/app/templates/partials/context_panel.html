<section class="w-[340px] shrink-0 border-r border-slate-200/90 bg-white/85 backdrop-blur-sm flex flex-col">
  <div class="border-b border-slate-200 px-5 py-4">
    <div class="flex items-start justify-between gap-3">
      <div>
        <p class="text-[11px] uppercase tracking-[0.14em] text-slate-500">SmartBench Workbench</p>
        <h2 class="mt-1 text-lg font-semibold text-slate-900">{{ panel_title }}</h2>
      </div>
      <button
        id="context-panel-hide-btn"
        type="button"
        class="focus-visible-ring rounded-md border border-slate-300 px-2.5 py-1 text-xs font-medium text-slate-600 hover:bg-slate-100"
      >
        Hide
      </button>
    </div>
  </div>
  <div class="smart-scroll min-h-0 flex-1 overflow-y-auto">
    {% include context_template %}
  </div>
</section>

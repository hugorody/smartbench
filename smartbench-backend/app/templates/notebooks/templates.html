{% extends "base.html" %}
{% block title %}Notebook Templates | SmartBench{% endblock %}
{% block content %}
<div class="space-y-6">
  <h2 class="text-2xl font-semibold">Notebook Templates</h2>
  <section class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50"><tr><th class="text-left p-3">Name</th><th class="text-left p-3">Description</th></tr></thead>
      <tbody>
      {% for t in templates %}
        <tr class="border-t"><td class="p-3">{{ t.name }}</td><td class="p-3">{{ t.description or '-' }}</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </section>
</div>
{% endblock %}

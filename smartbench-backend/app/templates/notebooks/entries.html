{% extends "base.html" %}
{% block title %}Notebook Entries | SmartBench{% endblock %}
{% block content %}
<div class="space-y-6">
  <h2 class="text-2xl font-semibold">Notebook Entries</h2>
  <section class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50"><tr><th class="text-left p-3">Key</th><th class="text-left p-3">Title</th><th class="text-left p-3">Status</th></tr></thead>
      <tbody>
      {% for entry in entries %}
        <tr class="border-t"><td class="p-3">{{ entry.entry_key }}</td><td class="p-3">{{ entry.title }}</td><td class="p-3">{{ entry.status }}</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </section>
</div>
{% endblock %}

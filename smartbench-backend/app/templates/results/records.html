{% extends "base.html" %}
{% block title %}Result Records | SmartBench{% endblock %}
{% block content %}
<div class="space-y-6">
  <h2 class="text-2xl font-semibold">Result Records</h2>
  <section class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50"><tr><th class="text-left p-3">Record Key</th><th class="text-left p-3">Data</th></tr></thead>
      <tbody>
      {% for record in records %}
        <tr class="border-t"><td class="p-3">{{ record.record_key }}</td><td class="p-3 font-mono text-xs">{{ record.data }}</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </section>
</div>
{% endblock %}

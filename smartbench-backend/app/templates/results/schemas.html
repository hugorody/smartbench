{% extends "base.html" %}
{% block title %}Result Schemas | SmartBench{% endblock %}
{% block content %}
<div class="space-y-6">
  <h2 class="text-2xl font-semibold">Result Schemas</h2>
  <section class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50"><tr><th class="text-left p-3">Name</th><th class="text-left p-3">ID</th></tr></thead>
      <tbody>
      {% for schema in schemas %}
        <tr class="border-t"><td class="p-3">{{ schema.name }}</td><td class="p-3 font-mono text-xs">{{ schema.id }}</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </section>
</div>
{% endblock %}
